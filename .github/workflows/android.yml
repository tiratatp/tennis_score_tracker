name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Lint & Static Analysis
      run: ./gradlew detekt ktlintCheck lintDebug --parallel

    - name: Test & Build
      run: ./gradlew testDebugUnitTest assembleDebug --parallel

    - name: Decode Keystore
      if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

    - name: Build Release APK
      if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_FILE: ${{ format('{0}/release.jks', github.workspace) }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Upload Phone APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Wear APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wear-debug-apk
        path: wear/build/outputs/apk/debug/*.apk

    - name: Rename APKs for Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/tennis-score-tracker-${VERSION}-debug.apk
        cp wear/build/outputs/apk/debug/wear-debug.apk wear/build/outputs/apk/debug/tennis-score-tracker-wear-${VERSION}-debug.apk
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tennis-score-tracker-${VERSION}-release.apk
        fi
        if [ -f wear/build/outputs/apk/release/wear-release.apk ]; then
          cp wear/build/outputs/apk/release/wear-release.apk wear/build/outputs/apk/release/tennis-score-tracker-wear-${VERSION}-release.apk
        fi

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/debug/tennis-score-tracker-*-debug.apk
          app/build/outputs/apk/release/tennis-score-tracker-*-release.apk
          wear/build/outputs/apk/debug/tennis-score-tracker-wear-*-debug.apk
          wear/build/outputs/apk/release/tennis-score-tracker-wear-*-release.apk
        generate_release_notes: true
