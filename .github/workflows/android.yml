name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Lint, Test & Build
      run: ./gradlew detekt ktlintCheck lintTennisDebug lintBadmintonDebug lintPickleballDebug testDebugUnitTest assembleDebug --parallel

    - name: Upload Phone APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apks
        path: app/build/outputs/apk/*/debug/*.apk

    - name: Upload Wear APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wear-debug-apks
        path: wear/build/outputs/apk/*/debug/*.apk

    - name: Decode Keystore
      if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

    - name: Build Release APKs & AABs
      if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_FILE: ${{ format('{0}/release.jks', github.workspace) }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease :app:bundleRelease :wear:bundleRelease --parallel

    - name: Rename APKs for Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        for flavor in tennis badminton pickleball; do
          case "$flavor" in
            tennis) name="tennisdroid" ;;
            badminton) name="badmintondroid" ;;
            pickleball) name="pickleballdroid" ;;
          esac
          if [ -f "app/build/outputs/apk/${flavor}Release/app-${flavor}-release.apk" ]; then
            cp "app/build/outputs/apk/${flavor}Release/app-${flavor}-release.apk" "app/build/outputs/apk/${flavor}Release/${name}-${VERSION}-release.apk"
          fi
          if [ -f "wear/build/outputs/apk/${flavor}Release/wear-${flavor}-release.apk" ]; then
            cp "wear/build/outputs/apk/${flavor}Release/wear-${flavor}-release.apk" "wear/build/outputs/apk/${flavor}Release/${name}-wear-${VERSION}-release.apk"
          fi
          if [ -f "app/build/outputs/bundle/${flavor}Release/app-${flavor}-release.aab" ]; then
            cp "app/build/outputs/bundle/${flavor}Release/app-${flavor}-release.aab" "app/build/outputs/bundle/${flavor}Release/${name}-${VERSION}-release.aab"
          fi
          if [ -f "wear/build/outputs/bundle/${flavor}Release/wear-${flavor}-release.aab" ]; then
            cp "wear/build/outputs/bundle/${flavor}Release/wear-${flavor}-release.aab" "wear/build/outputs/bundle/${flavor}Release/${name}-wear-${VERSION}-release.aab"
          fi
        done

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/tennisRelease/tennisdroid-*-release.apk
          app/build/outputs/apk/badmintonRelease/badmintondroid-*-release.apk
          app/build/outputs/apk/pickleballRelease/pickleballdroid-*-release.apk
          wear/build/outputs/apk/tennisRelease/tennisdroid-wear-*-release.apk
          wear/build/outputs/apk/badmintonRelease/badmintondroid-wear-*-release.apk
          wear/build/outputs/apk/pickleballRelease/pickleballdroid-wear-*-release.apk
          app/build/outputs/bundle/tennisRelease/tennisdroid-*-release.aab
          app/build/outputs/bundle/badmintonRelease/badmintondroid-*-release.aab
          app/build/outputs/bundle/pickleballRelease/pickleballdroid-*-release.aab
          wear/build/outputs/bundle/tennisRelease/tennisdroid-wear-*-release.aab
          wear/build/outputs/bundle/badmintonRelease/badmintondroid-wear-*-release.aab
          wear/build/outputs/bundle/pickleballRelease/pickleballdroid-wear-*-release.aab
        generate_release_notes: true

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Python
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
      env:
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

    - name: Install Python dependencies
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      run: pip install Pillow && sudo apt-get install -y fonts-roboto
      env:
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

    - name: Decode Keystore
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

    - name: Generate All Screenshots
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      env:
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        KEYSTORE_FILE: ${{ format('{0}/release.jks', github.workspace) }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew :app:preparePlayStoreScreenshotsTennis :app:updateTennisScreenshots :app:preparePlayStoreScreenshotsBadminton :app:updateBadmintonScreenshots :app:preparePlayStoreScreenshotsPickleball :app:updatePickleballScreenshots --parallel
        python3 assets/generate_feature_graphic.py tennis
        python3 assets/generate_feature_graphic.py badminton
        python3 assets/generate_feature_graphic.py pickleball

    - name: Publish All Phone Apps to Play Store
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      env:
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        KEYSTORE_FILE: ${{ format('{0}/release.jks', github.workspace) }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew :wear:bundleRelease :app:publishTennisReleaseBundle
      # TODO: Uncomment when badminton/pickleball apps are created on Play Store
      # :app:publishBadmintonReleaseBundle :app:publishPickleballReleaseBundle

    - name: Publish Tennis Wear App to Play Store (Internal Testing)
      if: env.PLAY_STORE_SERVICE_ACCOUNT_JSON != ''
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        packageName: com.nuttyknot.tennisscoretracker
        releaseFiles: wear/build/outputs/bundle/tennisRelease/wear-tennis-release.aab
        track: wear:internal
        status: completed
        mappingFile: wear/build/outputs/mapping/tennisRelease/mapping.txt
      env:
        PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

    # TODO: Uncomment when badminton app is created on Play Store
    # - name: Publish Badminton Wear App to Play Store (Internal Testing)
